<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Limko Medical{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* ── Global theme reset ── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #f8fafc;
            color: #134e4a;
            margin: 0;
        }

        /* ── Shared Navbar (for non-home pages) ── */
        .main-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 64px;
            padding: 0 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(20,184,166,0.15);
        }

        .main-nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 800;
            color: #134e4a;
            text-decoration: none;
            letter-spacing: 0.01em;
        }

        .main-nav-logo span { color: #14b8a6; }

        .main-nav-logo svg {
            width: 20px;
            height: 20px;
        }

        .main-nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .main-nav-links a {
            font-size: 13px;
            font-weight: 600;
            color: #134e4a;
            text-decoration: none;
            opacity: 0.65;
            transition: opacity 0.2s, color 0.2s;
        }

        .main-nav-links a:hover,
        .main-nav-links a.active {
            opacity: 1;
            color: #0f766e;
        }

        .main-nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn-ghost {
            background: transparent;
            border: 1.5px solid rgba(20,184,166,0.45);
            color: #0f766e;
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn-fill {
            background: linear-gradient(90deg, #14b8a6, #22d3ee);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }

        /* ── Shared Footer ── */
        .main-footer {
            background: white;
            border-top: 1px solid rgba(20,184,166,0.12);
            padding: 2.5rem 2.5rem;
            margin-top: 5rem;
            text-align: center;
        }

        .main-footer .footer-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 17px;
            font-weight: 800;
            color: #134e4a;
            text-decoration: none;
            margin-bottom: 0.6rem;
        }

        .main-footer .footer-logo span { color: #14b8a6; }

        .main-footer p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
        }

        .main-footer .disclaimer {
            margin-top: 0.5rem;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar (hidden on home page which has its own) -->
    {% block navbar %}
    <nav class="main-nav">
        <a href="{{ url_for('main.index') }}" class="main-nav-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="2.5">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            Limko<span>Medical</span>
        </a>
        <ul class="main-nav-links">
            <li><a href="{{ url_for('main.index') }}">Home</a></li>
            <li><a href="{{ url_for('main.predict') }}">Predict</a></li>
            <li><a href="{{ url_for('main.about') }}">About</a></li>
        </ul>
        <div class="main-nav-actions">
            <button class="nav-btn-ghost">Sign in</button>
            <a href="{{ url_for('main.predict') }}" class="nav-btn-fill">Get started</a>
        </div>
    </nav>
    {% endblock %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer 
    {% block footer %}
    <footer class="main-footer">
        <a href="{{ url_for('main.index') }}" class="footer-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="2.5" style="width:18px;height:18px;">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            Limko<span>Medical</span>
        </a>
        <p>&copy; 2026 Limko Medical — AI-Powered Drug Recommendation System</p>
        <p class="disclaimer">
            <i class="fas fa-exclamation-triangle me-1"></i>
            This is not medical advice. Always consult your healthcare provider.
        </p>
    </footer>
    {% endblock %}-->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
