{% extends "base.html" %}

{% block title %}Drug Advisor - Predict{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-stethoscope me-2"></i>
                        Describe Your Symptoms
                    </h4>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('main.predict') }}" id="predict-form">
                        <div class="mb-3">
                            <label for="symptoms" class="form-label fw-bold">
                                How are you feeling?
                            </label>
                            <textarea 
                                class="form-control" 
                                id="symptoms" 
                                name="symptoms" 
                                rows="6" 
                                placeholder="Describe your symptoms..."
                                required
                            >{{ request.form.get('symptoms', '') }}</textarea>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                                <i class="fas fa-search me-2"></i>Analyze Symptoms
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('predict-form').addEventListener('submit', function() {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analyzing...';
});
</script>
{% endblock %}
